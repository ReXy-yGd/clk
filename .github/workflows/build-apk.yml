name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'adopt'
    
    - name: Create Android Project
      run: |
        mkdir -p MyApp/app/src/main/assets
        mkdir -p MyApp/app/src/main/java/com/example/myapp
        mkdir -p MyApp/app/src/main/res/values
        mkdir -p MyApp/gradle/wrapper
        
    - name: Copy HTML to assets
      run: |
        cp index.html MyApp/app/src/main/assets/
        
    - name: Create AndroidManifest.xml
      run: |
        cat > MyApp/app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.myapp">
        
            <uses-permission android:name="android.permission.INTERNET" />
        
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="ClickForge"
                android:supportsRtl="true">
        
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        
        </manifest>
        EOF
        
    - name: Create MainActivity.java
      run: |
        cat > MyApp/app/src/main/java/com/example/myapp/MainActivity.java << 'EOF'
        package com.example.myapp;
        
        import android.os.Bundle;
        import android.webkit.WebView;
        import androidx.appcompat.app.AppCompatActivity;
        
        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.getSettings().setDomStorageEnabled(true);
                webView.loadUrl("file:///android_asset/index.html");
                setContentView(webView);
            }
        }
        EOF
        
    - name: Create build.gradle
      run: |
        cat > MyApp/app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
        }
        
        android {
            compileSdk 33
            
            defaultConfig {
                applicationId "com.example.myapp"
                minSdk 21
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
            
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF
        
    - name: Create settings.gradle
      run: |
        cat > MyApp/settings.gradle << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "MyApp"
        include ':app'
        EOF
        
    - name: Create build.gradle (root)
      run: |
        cat > MyApp/build.gradle << 'EOF'
        plugins {
            id 'com.android.application' version '7.3.0' apply false
        }
        EOF
        
    - name: Download Gradle wrapper
      run: |
        cd MyApp
        gradle wrapper --gradle-version 7.6.1
        
    - name: Build APK
      run: |
        cd MyApp
        chmod +x gradlew
        ./gradlew assembleRelease
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-release
        path: MyApp/app/build/outputs/apk/release/app-release.apk
